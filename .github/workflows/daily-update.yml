name: Daily VPN Dashboard Update

on:
  workflow_dispatch:
    inputs:
      skip_network:
        description: "排错模式：true=不访问外网，只验证脚本和发布流程"
        required: false
        default: "false"
      lookback_hours:
        description: "时效窗口小时数，默认 36"
        required: false
        default: "36"
  schedule:
    # GitHub cron uses UTC. 00:15 UTC = 08:15 Asia/Singapore.
    - cron: "15 0 * * *"
  push:
    paths:
      - "config/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/daily-update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DASHBOARD_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '36' }}
      FRESHNESS_HOURS: ${{ github.event.inputs.lookback_hours || '36' }}
      FRESHNESS_WINDOW_HOURS: ${{ github.event.inputs.lookback_hours || '36' }}
      UNKNOWN_DATE_POLICY: "exclude"
      MAX_SOURCES_PER_RUN: "90"
      MAX_ITEMS_PER_SOURCE: "8"
      MAX_WORKERS: "6"
      HTTP_TIMEOUT_SECONDS: "8"
      SKIP_NETWORK: ${{ github.event.inputs.skip_network == 'true' && '1' || '0' }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DASHBOARD_USER_AGENT: ${{ secrets.DASHBOARD_USER_AGENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repository layout
        run: |
          echo "Current branch: ${{ github.ref_name }}"
          echo "Repository root: $(pwd)"
          echo "Top-level files:"
          find . -maxdepth 2 -type f | sort | sed 's#^./##' | head -120

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip freeze

      - name: Validate required files
        run: |
          test -f config/sources.csv || (echo "Missing config/sources.csv. 请确认 config 文件夹在仓库根目录，不是在多套一层文件夹里。" && exit 1)
          test -f scripts/update_dashboard.py || (echo "Missing scripts/update_dashboard.py. 请确认 scripts 文件夹在仓库根目录。" && exit 1)
          test -f requirements.txt || (echo "Missing requirements.txt. 请确认 requirements.txt 在仓库根目录。" && exit 1)
          python -m py_compile scripts/update_dashboard.py

      - name: Generate dashboard
        run: |
          echo "Freshness window: ${DASHBOARD_LOOKBACK_HOURS} hours"
          echo "Skip network: ${SKIP_NETWORK}"
          python -u scripts/update_dashboard.py

      - name: Show generated status
        if: always()
        run: |
          echo "Generated docs files:"
          find docs -maxdepth 3 -type f | sort | head -120 || true
          echo "Last run status:"
          if [ -f docs/status/last_run.json ]; then cat docs/status/last_run.json; else echo "docs/status/last_run.json not found"; fi

      - name: Optional commit generated dashboard files
        if: ${{ vars.SAVE_GENERATED_FILES == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
